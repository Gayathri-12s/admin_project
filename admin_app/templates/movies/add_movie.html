{% extends 'base.html' %}
{% block content %}

<div class="card col-md-8 mx-auto">

  <div class="card-header bg-dark text-white">
    <h5>Add / Edit Movie</h5>
  </div>

  <div class="card-body">

    <form method="POST" enctype="multipart/form-data">

      {% csrf_token %}

      <div class="mb-3">
        <label>Title</label>
        <input type="text"
               name="title"
               class="form-control"
               value="{{ movie.title|default:'' }}"
               required>
      </div>

      <div class="mb-3">
        <label>Description</label>
        <textarea name="description"
                  class="form-control"
                  rows="4"
                  required>{{ movie.description|default:'' }}</textarea>
      </div>

      <div class="mb-3">
        <label>Release Date</label>
        <input type="date"
               name="release_date"
               class="form-control"
               value="{{ movie.release_date|default:'' }}"
               required>
      </div>

      <div class="mb-3">
        <label>Thumbnail</label>
        <input type="file" name="thumbnail" class="form-control">
      </div>

      <div class="mb-3">
        <label>Video</label>
        <input type="file" name="video_file" class="form-control">
      </div>

      <div class="text-end">

        <a href="{% url 'movie_list' %}" class="btn btn-secondary">
          Cancel
        </a>

        <button type="submit" class="btn btn-primary">
          Save
        </button>

      </div>

    </form>

  </div>

</div>

{% endblock %}
