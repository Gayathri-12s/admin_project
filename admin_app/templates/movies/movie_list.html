{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="page-title mb-0">Movies</h1>
  <a href="{% url 'add_movie' %}" class="btn btn-primary">
    Add New Movie
  </a>
</div>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>Title</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for movie in movies %}
          <tr>
            <td class="fw-semibold">{{ movie.title }}</td>
            <td class="text-center">
              <div class="d-inline-flex gap-2">
                
                <a href="{% url 'view_movie' movie.id %}" class="btn btn-sm btn-info">
                  View
                </a>

                <a href="{% url 'edit_movie' movie.id %}" class="btn btn-sm btn-warning">
                  Edit
                </a>

                <button 
                  type="button" 
                  class="btn btn-sm btn-danger"
                  data-bs-toggle="modal" 
                  data-bs-target="#deleteModal"
                  data-url="{% url 'delete_movie' movie.id %}">
                  Delete
                </button>

              </div>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="2" class="text-center text-muted py-4">
              No movies found. Click "Add New Movie" to get started!
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock %}
