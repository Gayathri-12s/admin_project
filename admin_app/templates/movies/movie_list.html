{% extends 'base.html' %}

{% block content %}

<h3 class="page-title mb-4">🎬 Movies</h3>

<div class="d-flex justify-content-end mb-3">
  <a href="{% url 'add_movie' %}" class="btn btn-primary">
    + Add Movie
  </a>
</div>

<div class="card shadow form-card">

  <div class="card-body p-0">

    <table class="table table-hover align-middle mb-0">

      <thead class="table-dark">
        <tr>
          <th>Title</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>

      <tbody>

        {% for movie in movies %}

        <tr>

          <td>{{ movie.title }}</td>

          <td class="text-center">

            <a href="{% url 'view_movie' movie.id %}"
               class="btn btn-sm btn-info">
              View
            </a>

            <a href="{% url 'edit_movie' movie.id %}"
               class="btn btn-sm btn-warning">
              Edit
            </a>

            <a href="{% url 'delete_movie' movie.id %}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Delete this movie?')">
              Delete
            </a>

          </td>

        </tr>

        {% empty %}

        <tr>
          <td colspan="2" class="text-center text-muted py-4">
            No movies yet
          </td>
        </tr>

        {% endfor %}

      </tbody>

    </table>

  </div>

</div>

{% endblock %}
