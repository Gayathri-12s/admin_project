{% extends 'base.html' %}
{% block content %}

<div class="container-fluid mt-4">

  <h3 class="page-title mb-4">🎬 Movie Details</h3>

  <div class="card movie-details-card shadow-lg">
    <div class="card-body">

      <div class="row g-4 align-items-center">

        <!-- Poster -->
        <div class="col-md-3 text-center">
          <img
            src="https://via.placeholder.com/250x350"
            class="img-fluid movie-thumbnail"
            alt="Movie Thumbnail"
          >
        </div>

        <!-- Details -->
        <div class="col-md-9">

          <table class="table table-borderless movie-table mb-4">
            <tbody>
              <tr>
                <th style="width: 160px;">Title</th>
                <td class="fw-semibold">Sample Movie Title</td>
              </tr>

              <tr>
                <th class="align-top">Description</th>
                <td class="movie-description">
                  This is a sample movie description. It explains the storyline,
                  genre, and important details about the movie.
                </td>
              </tr>
            </tbody>
          </table>

          <div class="d-flex gap-3">
            <a href="{% url 'edit_movie' %}" class="btn btn-warning px-4">
              Edit
            </a>

            <a href="#" class="btn btn-danger px-4"
               onclick="return confirm('Are you sure you want to delete this movie?');">
              Delete
            </a>
          </div>

        </div>

      </div>

    </div>
  </div>

</div>

{% endblock %}
