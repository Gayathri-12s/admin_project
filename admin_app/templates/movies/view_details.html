{% extends 'base.html' %}
{% block content %}

<div class="container-fluid mt-4">

  <h3 class="page-title mb-4">🎬 Movie Details</h3>

  <div class="card movie-details-card shadow-lg">
    <div class="card-body">

      <div class="row g-4 align-items-center">

        <!-- Poster -->
        <div class="col-md-3 text-center">

          {% if movie.thumbnail %}
            <img
              src="{{ movie.thumbnail.url }}"
              class="img-fluid movie-thumbnail"
              alt="{{ movie.title }}"
            >
          {% else %}
            <img
              src="https://via.placeholder.com/250x350"
              class="img-fluid movie-thumbnail"
            >
          {% endif %}

        </div>

        <!-- Details -->
        <div class="col-md-9">

          <table class="table table-borderless movie-table mb-4">
            <tbody>

              <tr>
                <th style="width: 160px;">Title</th>
                <td class="fw-semibold">
                  {{ movie.title }}
                </td>
              </tr>

              <tr>
                <th class="align-top">Description</th>
                <td class="movie-description">
                  {{ movie.description }}
                </td>
              </tr>

              <tr>
                <th>Release Date</th>
                <td>
                  {{ movie.release_date }}
                </td>
              </tr>

              <tr>
                <th>Views</th>
                <td>
                  {{ movie.view_count }}
                </td>
              </tr>

            </tbody>
          </table>

          <div class="d-flex gap-3">

            <a href="{% url 'edit_movie' movie.id %}"
               class="btn btn-warning px-4">
              Edit
            </a>

            <a href="{% url 'delete_movie' movie.id %}"
               class="btn btn-danger px-4"
               onclick="return confirm('Are you sure you want to delete this movie?');">
              Delete
            </a>

          </div>

        </div>

      </div>

    </div>
  </div>

</div>

{% endblock %}
