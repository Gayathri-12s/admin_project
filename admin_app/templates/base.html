{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>FilmStream Admin</title>

  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">FilmStream Admin</span>

  <div class="dropdown">
    <button class="btn btn-dark dropdown-toggle" data-bs-toggle="dropdown">
      Admin
    </button>
    <ul class="dropdown-menu dropdown-menu-end">
      <li>
        <a class="dropdown-item" href="{% url 'change_password' %}">
          Change Password
        </a>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <a class="dropdown-item text-danger" href="{% url 'admin_login' %}">
          Logout
        </a>
      </li>
    </ul>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'movie_list' %}">Movies</a>
    <a href="{% url 'user_list' %}">Users</a>
    <a href="{% url 'report' %}">Reports</a>
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
