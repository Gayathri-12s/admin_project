{% extends 'base.html' %}
{% block content %}

<h1 class="page-title">Users</h1>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>Email</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
          <tr>
            <td class="fw-semibold">{{ user.email }}</td>
            <td>
              {% if user.is_active %}
                <span class="badge bg-success">Active</span>
              {% else %}
                <span class="badge bg-danger">Blocked</span>
              {% endif %}
            </td>
            <td class="text-center">
              {% if user.is_active %}
                <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal" data-url="{% url 'block_user' user.id %}">Block</button>
              {% else %}
                <a href="{% url 'unblock_user' user.id %}" class="btn btn-sm btn-success">Unblock</a>
              {% endif %}
              <a href="{% url 'user_history' user.id %}" class="btn btn-sm btn-info">History</a>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3" class="text-center py-4 text-muted">No users found</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock %}
