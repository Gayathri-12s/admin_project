{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg bg-dark text-light" style="width:380px">
  <div class="card-body">

    <h4 class="text-center mb-4">Admin Login</h4>

    <!-- UI ONLY (NO FORM SUBMIT) -->
    <div class="mb-3">
      <label>Email</label>
      <input class="form-control" placeholder="admin@email.com">
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" class="form-control" placeholder="********">
    </div>

    <!-- Redirect using anchor -->
    <a href="{% url 'dashboard' %}" class="btn btn-primary w-100">
      Login
    </a>

  </div>
</div>

</body>
</html>
